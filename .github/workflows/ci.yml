name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      # `live` is included because the provider/results tests exercise the
      # requests-based code paths via MOCKS (monkeypatched requests.get) — no
      # network happens, but the requests library must be importable for them.
      - name: Install (dev + plot + live extras)
        run: pip install -e ".[dev,plot,live]"

      # All tests run fully offline against the bundled mock fixtures —
      # no network access and no real/licensed data are required.
      - name: Run tests
        run: pytest -q

      - name: Type check
        run: mypy
